<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualize Graph - Book Recommendation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Book Recommendation System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/visualize">Visualize Graph</a></li>
                    <li class="nav-item"><a class="nav-link" href="/users">Login / Users</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-lg-9">
                <h1>RDF Graph Visualization</h1>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                
                <div id="visualization" class="border rounded" style="height: 600px; overflow: auto; background-color: #f8f9fa;">
                    <svg id="graph-svg" style="width: 100%; height: 100%;"></svg>
                </div>
                <input type="hidden" id="page-context" value="visualize" />
            </div>

            <div class="col-lg-3">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">Statistics</h5>
                    </div>
                    <div class="card-body">
                        <p><strong>Statements:</strong> <span th:text="${statistics['statements'] ?: 0}">0</span></p>
                        <p><strong>Resources:</strong> <span th:text="${statistics['resources'] ?: 0}">0</span></p>
                        <p><strong>Properties:</strong> <span th:text="${statistics['properties'] ?: 0}">0</span></p>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header bg-secondary text-white">
                        <h5 class="mb-0">Legend</h5>
                    </div>
                    <div class="card-body small">
                        <p>• Blue nodes: Resources</p>
                        <p>• Green nodes: Properties</p>
                        <p>• Gray nodes: Literals</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const graphData = JSON.parse(/*[[${graphJson}]]*/ 'null');

        if (graphData && graphData.nodes) {
            visualizeGraph(graphData);
        }

        function visualizeGraph(data) {
            const width = document.getElementById('visualization').clientWidth;
            const height = document.getElementById('visualization').clientHeight;

            const svg = d3.select('#graph-svg')
                .attr('width', width)
                .attr('height', height);

            const simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.edges).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2));

            const link = svg.selectAll('line')
                .data(data.edges)
                .enter()
                .append('line')
                .attr('stroke', '#999')
                .attr('stroke-opacity', 0.6)
                .attr('stroke-width', 2);

            const node = svg.selectAll('circle')
                .data(data.nodes)
                .enter()
                .append('circle')
                .attr('r', 5)
                .attr('fill', d => d.type === 'literal' ? '#ccc' : '#1f77b4')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));

            const label = svg.selectAll('text')
                .data(data.nodes)
                .enter()
                .append('text')
                .attr('dy', 4)
                .attr('text-anchor', 'middle')
                .attr('font-size', '10px')
                .text(d => d.label.substring(0, 10));

            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);

                label
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
            });

            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }

            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }

            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
