<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Book Recommendation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Book Recommendation System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/books">Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="/upload">Upload RDF</a></li>
                    <li class="nav-item"><a class="nav-link" href="/visualize">Visualize Graph</a></li>
                    <li class="nav-item"><a class="nav-link" href="/manage">Manage Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="/users">Login / Users</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Available Books</h1>
        <p class="text-muted">Total: <span th:text="${bookCount}">0</span> books</p>

        <div th:if="${books != null and books.size() > 0}">
            <div class="row">
                <div th:each="book : ${books}" class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${book.title}">Book Title</h5>
                            <p class="card-text">
                                <strong>Author:</strong> <span th:text="${book.author}">Author</span><br>
                                <strong>Level:</strong> <span th:text="${book.readingLevel}" class="badge bg-info">Level</span><br>
                                <strong>Themes:</strong>
                                <span th:each="theme : ${book.themes}" th:text="${theme}" class="badge bg-success me-1"></span>
                            </p>
                        </div>
                        <div class="card-footer bg-white">
                            <a th:href="@{/book/{id}(id=${book.uri.substring(book.uri.lastIndexOf('/') + 1)})}" class="btn btn-sm btn-primary">
                                View Details
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${books == null or books.size() == 0}" class="alert alert-info">
            <p>No books found. <a href="/upload">Upload an RDF file</a> to get started.</p>
        </div>
    </div>
    <input type="hidden" id="page-context" value="books-list" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
