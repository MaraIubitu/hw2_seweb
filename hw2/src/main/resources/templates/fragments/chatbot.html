<!DOCTYPE html>
<div th:fragment="chatbot">
    <!-- Chatbot Widget Fragment -->
    <div id="chatbot-widget" class="chatbot-widget">
        <div class="chatbot-header">
            <span>💬 Book Assistant</span>
            <button class="btn-close" onclick="toggleChatbot()"></button>
        </div>
        <div class="chatbot-body" id="chatbot-body">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-starters" id="chat-starters"></div>
        </div>
        <div class="chatbot-footer">
            <input type="text" id="chat-input" class="form-control" placeholder="Ask me about books..." onkeypress="handleChatKeypress(event)">
            <button class="btn btn-primary btn-sm mt-2 w-100" onclick="sendChatMessage()">Send</button>
        </div>
    </div>
    <button class="chatbot-button" onclick="toggleChatbot()">💬</button>
    <script src="/js/chatbot.js"></script>
</div>
