<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Book Recommendation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Book Recommendation System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/books">Books</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/users">Login / Users</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-lg-8">
                <h1>Users</h1>
                <p class="lead">Choose a profile to see recommendations based on reading level and preferred theme.</p>
            </div>
            <div class="col-lg-4 text-lg-end">
                <div th:if="${currentUser != null}" class="alert alert-info mb-0">
                    Logged in as <strong th:text="${currentUser.name}">User</strong>
                    <form th:action="@{/users/logout}" method="post" class="mt-2">
                        <button type="submit" class="btn btn-sm btn-secondary">Logout</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 col-lg-4 mb-4" th:each="user : ${users}">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${user.name}">Alice</h5>
                        <p class="card-text mb-2">Reading level: <span class="badge bg-info" th:text="${user.readingLevel}"></span></p>
                        <p class="card-text">
                            Prefers:
                            <span th:each="theme, iterStat : ${user.preferredThemes}">
                                <span th:text="${theme}">Theme</span><span th:if="${!iterStat.last}">, </span>
                            </span>
                        </p>
                    </div>
                    <div class="card-footer bg-white">
                        <form th:action="@{/users/login/{id}(id=${user.uri.substring(user.uri.lastIndexOf('/') + 1)})}" method="post">
                            <button type="submit" class="btn btn-primary btn-sm">Login as <span th:text="${user.name}">user</span></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="hidden" id="page-context" value="users" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="fragments/chatbot :: chatbot"></div>
</body>
</html>
</body>
</html>
