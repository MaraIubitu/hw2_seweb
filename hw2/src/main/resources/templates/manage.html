<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books - Book Recommendation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Book Recommendation System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/manage">Manage Books</a></li>
                    <li class="nav-item"><a class="nav-link" href="/users">Login / Users</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Manage Books</h1>

        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="add-tab" data-bs-toggle="tab" data-bs-target="#add-panel" type="button" role="tab">Add Book</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="list-tab" data-bs-toggle="tab" data-bs-target="#list-panel" type="button" role="tab">Edit/Delete Books</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Add Book Tab -->
            <div class="tab-pane fade show active" id="add-panel" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Add New Book</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/book/add}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>
                            <div class="mb-3">
                                <label for="author" class="form-label">Author</label>
                                <input type="text" class="form-control" id="author" name="author" required>
                            </div>
                            <div class="mb-3">
                                <label for="themes" class="form-label">Themes (comma-separated)</label>
                                <input type="text" class="form-control" id="themes" name="themes" placeholder="e.g., Science Fiction, Fantasy" required>
                            </div>
                            <div class="mb-3">
                                <label for="readingLevel" class="form-label">Reading Level</label>
                                <select class="form-control" id="readingLevel" name="readingLevel" required>
                                    <option value="Beginner">Beginner</option>
                                    <option value="Intermediate">Intermediate</option>
                                    <option value="Advanced">Advanced</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Book</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Edit/Delete Tab -->
            <div class="tab-pane fade" id="list-panel" role="tabpanel">
                <div th:if="${books != null and books.size() > 0}">
                    <div th:each="book : ${books}" class="card mb-3">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-8">
                                    <h5 class="card-title" th:text="${book.title}">Title</h5>
                                    <p class="card-text">
                                        <strong>Author:</strong> <span th:text="${book.author}"></span><br>
                                        <strong>Themes:</strong>
                                        <span th:each="theme, iterStat : ${book.themes}">
                                            <span th:text="${theme}">Theme</span><span th:if="${!iterStat.last}">, </span>
                                        </span><br>
                                        <strong>Level:</strong> <span th:text="${book.readingLevel}"></span>
                                    </p>
                                </div>
                                <div class="col-md-4 text-end">
                                    <button class="btn btn-sm btn-warning" type="button"
                                            th:data-book-id="${book.uri.substring(book.uri.lastIndexOf('/') + 1)}"
                                            th:data-book-title="${book.title}"
                                            th:data-book-author="${book.author}"
                                            th:data-book-themes="${#strings.listJoin(book.themes, ',')}"
                                            th:data-book-level="${book.readingLevel}"
                                            onclick="openEditModal(this)">Edit</button>
                                    <form th:action="@{/book/{id}/delete(id=${book.uri.substring(book.uri.lastIndexOf('/') + 1)})}" method="post" style="display: inline;">
                                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this book?')">Delete</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${books == null or books.size() == 0}">
                    <p class="text-muted">No books available.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Book</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="editForm" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="editTitle" class="form-label">Title</label>
                            <input type="text" class="form-control" id="editTitle" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="editAuthor" class="form-label">Author</label>
                            <input type="text" class="form-control" id="editAuthor" name="author" required>
                        </div>
                        <div class="mb-3">
                            <label for="editThemes" class="form-label">Themes (comma-separated)</label>
                            <input type="text" class="form-control" id="editThemes" name="themes" required>
                        </div>
                        <div class="mb-3">
                            <label for="editReadingLevel" class="form-label">Reading Level</label>
                            <select class="form-control" id="editReadingLevel" name="readingLevel" required>
                                <option value="Beginner">Beginner</option>
                                <option value="Intermediate">Intermediate</option>
                                <option value="Advanced">Advanced</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <input type="hidden" id="page-context" value="manage" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openEditModal(button) {
            const bookId = button.getAttribute('data-book-id');
            const title = button.getAttribute('data-book-title');
            const author = button.getAttribute('data-book-author');
            const themes = button.getAttribute('data-book-themes');
            const level = button.getAttribute('data-book-level');

            document.getElementById('editTitle').value = title;
            document.getElementById('editAuthor').value = author;
            document.getElementById('editThemes').value = themes;
            document.getElementById('editReadingLevel').value = level;
            document.getElementById('editForm').action = '/book/' + bookId + '/update';

            var modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
        }
    </script>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
</body>
</html>
