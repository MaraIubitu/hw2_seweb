spring.application.name=book-recommendation-system
server.port=8080
server.servlet.context-path=/

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File upload size limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=INFO
logging.level.org.example=DEBUG

# LLM Configuration (Hugging Face Inference API)
# API key is loaded from HF_API_KEY env var (set in .env file)
llm.api.url=https://router.huggingface.co/v1
llm.api.key=${HF_API_KEY:}
llm.model=Qwen/Qwen2.5-7B-Instruct
