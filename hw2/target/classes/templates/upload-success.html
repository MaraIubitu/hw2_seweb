<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Success - Book Recommendation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Book Recommendation System</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-success">
            <h4 class="alert-heading">Success!</h4>
            <p th:text="${message}">File uploaded successfully.</p>
        </div>

        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">File Statistics</h5>
            </div>
            <div class="card-body">
                <p><strong>Statements:</strong> <span th:text="${statistics['statements'] ?: 0}">0</span></p>
                <p><strong>Resources:</strong> <span th:text="${statistics['resources'] ?: 0}">0</span></p>
                <p><strong>Properties:</strong> <span th:text="${statistics['properties'] ?: 0}">0</span></p>
            </div>
        </div>

        <div class="mt-3">
            <a href="/" class="btn btn-primary">Return to Home</a>
            <a href="/visualize" class="btn btn-info">View Visualization</a>
            <a href="/books" class="btn btn-success">View Books</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
