<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload RDF - Book Recommendation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Book Recommendation System</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/upload">Upload RDF</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <h1>Upload RDF File</h1>
                <p class="text-muted">Upload your RDF/XML file to load books into the system.</p>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="file" class="form-label">Select RDF File</label>
                                <input type="file" class="form-control" id="file" name="file" accept=".rdf,.xml" required>
                                <small class="text-muted">Supported formats: RDF/XML</small>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Upload</button>
                        </form>
                    </div>
                </div>

                <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
                <div th:if="${message}" class="alert alert-success mt-3" th:text="${message}"></div>

                <div class="alert alert-info mt-4">
                    <h6>Expected RDF Format:</h6>
                    <pre><code>&lt;?xml version="1.0"?&gt;
&lt;rdf:RDF xmlns:rdf="..."&gt;
  &lt;rdf:Description rdf:about="..."&gt;
    ...
  &lt;/rdf:Description&gt;
&lt;/rdf:RDF&gt;</code></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
